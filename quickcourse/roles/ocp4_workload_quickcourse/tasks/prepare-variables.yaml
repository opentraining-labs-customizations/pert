---
- name: Check for required variables
  ansible.builtin.assert:
    that:
    - guid is defined
    - guid != ''
    - ocp4_workload_quickcourse_content_git_repo is defined
    - ocp4_workload_quickcourse_content_git_repo != ''
    quiet: true
    fail_msg: Required variables not defined

- name: Set quickcourse_user_data fact from lookup - global value
  ansible.builtin.set_fact:
    _quickcourse_user_data: "{{ _quickcourse_user_data | combine(lookup('agnosticd_user_data', '*', errors='ignore') | default({})) }}"
  failed_when: false

- name: Set fact _user_count
  when: _quickcourse_user_data.users is defined
  ansible.builtin.set_fact:
    _user_count: "{{ _quickcourse_user_data['users'] | length }}"

- name: Read user-info.yaml
  delegate_to: localhost
  ansible.builtin.slurp:
    src: "{{ hostvars.localhost.output_dir ~ '/user-info.yaml' }}"
  register: r_user_info
  failed_when: false

- name: Set fact for user info
  when: r_user_info.content is defined
  ansible.builtin.set_fact:
    _quickcourse_user_info: '{{ r_user_info.content | b64decode | from_yaml | default([], true) | join("\n") }}'

- name: Retrieve OpenShift Ingress
  when: not ocp4_workload_quickcourse_use_sandbox_domain | default(false)
  kubernetes.core.k8s_info:
    kubeconfig: "{{ _quickcourse_kubeconfig | default(omit) }}"
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: r_ingress_config
  until:
  - r_ingress_config.resources.0 is defined
  - r_ingress_config.resources | length  > 0
  delay: 15
  retries: 60

- name: Get OpenShift Apps Domain (Non Equinix)
  when:
  - r_ingress_config.resources[0].spec.appsDomain is not defined
  - not ocp4_workload_quickcourse_use_sandbox_domain | default(false)
  ansible.builtin.set_fact:
    _deployer_domain: "{{ r_ingress_config.resources[0].spec.domain }}"

- name: Get OpenShift Apps Domain (Equinix)
  when:
  - r_ingress_config.resources[0].spec.appsDomain is defined
  - not ocp4_workload_quickcourse_use_sandbox_domain | default(false)
  ansible.builtin.set_fact:
    _deployer_domain: "{{ r_ingress_config.resources[0].spec.appsDomain }}"

- name: Set _deployer_domain when environment is CNV
  when:
  - ocp4_workload_quickcourse_use_sandbox_domain | default(false)
  ansible.builtin.set_fact:
    _deployer_domain: "{{ sandbox_openshift_apps_domain }}"
