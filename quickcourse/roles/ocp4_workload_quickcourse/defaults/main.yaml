---
become_override: false
ocp_username: user-redhat.com
silent: false

tmp_dir: /tmp/{{ guid }}
tmp_kubeconfig: "{{ tmp_dir }}/.kube/config"

ocp4_workload_quickcourse_name: "quickcourse"
ocp4_workload_quickcourse_namespace: "quickcourse-{{ guid | default('00000') }}"
ocp4_workload_quickcourse_namespace_display: Quick Course Guide

# Content repository to be rendered as lab instructions
ocp4_workload_quickcourse_content_git_repo: https://github.com/RedHatQuickCourses/aap-on-openshift.git
ocp4_workload_quickcourse_content_git_repo_ref: main

# Which Antora Playbook to use in the content repo
ocp4_workload_quickcourse_content_antora_playbook: antora-playbook.yml

# Only display the content pane, no other tabs will be available
ocp4_workload_quickcourse_content_only: false

# Title of the index.html
ocp4_workload_quickcourse_content_title: Quick Course

# Which terminal to deploy:
# - wetty: deploy the wetty terminal image with SSH bastion auto-login
# - showroom: deploy the showroom terminal image
# - "": No terminal deployed
ocp4_workload_quickcourse_terminal_type: ""

# Enable vertically stacked terminals in one tab
ocp4_workload_quickcourse_stacked_terminals_enable: false
ocp4_workload_quickcourse_stacked_terminals_display_name: "Terminals"

# Enable a second terminal TAB in the Quick Course Pod
ocp4_workload_quickcourse_second_terminal_tab_enable: false
ocp4_workload_quickcourse_second_terminal_tab_display_name: "Terminal 2"

# Requests and limits for the terminal pod
ocp4_workload_quickcourse_terminal_requests_cpu: 50m
ocp4_workload_quickcourse_terminal_requests_memory: 256Mi
ocp4_workload_quickcourse_terminal_limits_cpu: 500m
ocp4_workload_quickcourse_terminal_limits_memory: 1Gi

# Container images
ocp4_workload_quickcourse_content_image: ghcr.io/rhpds/showroom-content:prod

# Quick Course Terminal Image (reusing showroom terminal images)
ocp4_workload_quickcourse_terminal_image: quay.io/rhpds/openshift-showroom-terminal-ocp:latest

# Wetty Image for SSH access
ocp4_workload_quickcourse_wetty_image: quay.io/rhpds/wetty:latest

# Log into bastion automatically from wetty
ocp4_workload_quickcourse_wetty_ssh_bastion_login: false

# The service name to look for when waiting for the created route
ocp4_workload_quickcourse_service_name: "{{ ocp4_workload_quickcourse_name }}"

# How to deploy Quick Course. Options are `helm`
ocp4_workload_quickcourse_deployment_type: helm

# Helm Chart to use for Quick Course (using showroom-deployer charts)
ocp4_workload_quickcourse_chart_package_url: https://rhpds.github.io/showroom-deployer
ocp4_workload_quickcourse_deployer_chart_name: showroom-single-pod
ocp4_workload_quickcourse_deployer_chart_version: "1.3.4"

# URL to download Helm from if it's not already there
ocp4_workload_quickcourse_tools_root_url: https://mirror.openshift.com/pub/openshift-v4/clients
ocp4_workload_quickcourse_helm_version: latest

# Override the Antora UI bundle URL to use a custom theme
# When empty, the default theme from the content repo is used
ocp4_workload_quickcourse_antora_ui_bundle_url: ""

# Use sandbox domain (for CNV environments)
ocp4_workload_quickcourse_use_sandbox_domain: false

# When true, omit Route host and let OpenShift generate it
ocp4_workload_quickcourse_route_omit_host: false

# Test self-provisioner by creating and removing a test ConfigMap
ocp4_workload_quickcourse_test_self_provisioner: false

# Defaults for _quickcourse_user_data so env destroys don't fail
_quickcourse_user_data:
  bastion_public_hostname: 'test_hostname'
  bastion_ssh_password: 'test_password'
  bastion_ssh_user_name: 'test_user_name'

# Public overrides merged into _quickcourse_vars after _quickcourse_user_data
quickcourse_vars: {}

# Variable injection settings
ocp4_workload_quickcourse_var_inject: true
ocp4_workload_quickcourse_auto_collect_vars: true
