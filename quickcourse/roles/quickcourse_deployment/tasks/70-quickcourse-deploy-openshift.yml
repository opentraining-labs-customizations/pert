---
# -----------------------------------------------------------------------
# Deploy Quick Course to OpenShift
# -----------------------------------------------------------------------

- name: Validate OpenShift credentials are provided
  assert:
    that:
      - quickcourse_openshift_api_url | length > 0
      - quickcourse_openshift_api_key | length > 0
    fail_msg: |
      ERROR: OpenShift API credentials are required!

      Please provide via extra-vars (command line):
        -e "openshift_api_url=https://api.cluster-xxxxx.example.com:6443"
        -e "openshift_api_key=sha256~your-token-here"

      Or via YAML vars file/playbook:
        openshift_api_url: https://api.cluster-xxxxx.example.com:6443
        openshift_api_key: sha256~your-token-here

      Alternative variable names are also supported:
        openshift_api_server_url: https://...
        openshift_token: sha256~...
        openshift_cluster_admin_token: eyJhbGci...

      Optional parameters:
        openshift_api_ca_cert: /path/to/ca.crt (or certificate content as string)
        openshift_validate_certs: false (to skip certificate validation)
    success_msg: "OpenShift API: {{ quickcourse_openshift_api_url }}"

- name: Create OpenShift namespace
  kubernetes.core.k8s:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ quickcourse_ocp_namespace }}"

- name: Build variable injection lines for antora-playbook.yml
  set_fact:
    quickcourse_var_lines: []
  when: quickcourse_collected_vars | default({}) | length == 0

- name: Build variable injection lines when variables exist
  set_fact:
    quickcourse_var_lines: "{{ quickcourse_var_lines | default([]) + ['    ' + item.key + ': \"' + item.value | string | replace('\"', '\\\"') + '\"'] }}"
  loop: "{{ quickcourse_collected_vars | default({}) | dict2items }}"
  when: quickcourse_collected_vars | default({}) | length > 0

- name: Join variable lines
  set_fact:
    quickcourse_asciidoc_attributes: "{{ quickcourse_var_lines | default([]) | join('\n') }}"

- name: Create ConfigMap for variables (to avoid argument list too long)
  kubernetes.core.k8s:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    state: present
    namespace: "{{ quickcourse_ocp_namespace }}"
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: quickcourse-vars
        namespace: "{{ quickcourse_ocp_namespace }}"
      data:
        variables.txt: "{{ quickcourse_asciidoc_attributes }}"
  when: quickcourse_asciidoc_attributes | default('') | length > 0

- name: Set volume mounts for init container
  set_fact:
    _init_volume_mounts:
      - name: app
        mountPath: /app
      - name: build
        mountPath: /build

- name: Add ConfigMap volume mount if variables exist
  set_fact:
    _init_volume_mounts: "{{ _init_volume_mounts + [{'name': 'quickcourse-vars', 'mountPath': '/var/quickcourse'}] }}"
  when: quickcourse_asciidoc_attributes | default('') | length > 0

- name: Set volumes list
  set_fact:
    _pod_volumes:
      - name: app
        emptyDir: {}
      - name: build
        emptyDir: {}

- name: Add ConfigMap volume if variables exist
  set_fact:
    _pod_volumes: "{{ _pod_volumes + [{'name': 'quickcourse-vars', 'configMap': {'name': 'quickcourse-vars'}}] }}"
  when: quickcourse_asciidoc_attributes | default('') | length > 0

- name: Create Quick Course Pod with variable injection
  kubernetes.core.k8s:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    state: present
    namespace: "{{ quickcourse_ocp_namespace }}"
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: quickcourse
        labels:
          app: quickcourse
      spec:
        initContainers:
        - name: builder
          image: "{{ quickcourse_ocp_builder_image }}"
          securityContext:
            runAsUser: 0
          command: ["/bin/bash"]
          args:
          - -xec
          - >-
            dnf install -y git &&
            rm -rf /build/* /build/.* 2>/dev/null || true &&
            cd /build &&
            git clone {{ quickcourse_git_repo }} . &&
            {% if quickcourse_git_ref != 'main' %}
            git checkout {{ quickcourse_git_ref }} &&
            {% endif %}
            {% if quickcourse_asciidoc_attributes | default('') | length > 0 %}
            if [ -f /var/quickcourse/variables.txt ]; then
              cp /var/quickcourse/variables.txt /tmp/vars.txt &&
              echo "" >> /tmp/vars.txt &&
              awk '/^  attributes:$/ {print; system("cat /tmp/vars.txt"); next} 1' antora-playbook.yml > /tmp/playbook.yml &&
              mv /tmp/playbook.yml antora-playbook.yml &&
              rm -f /tmp/vars.txt &&
              echo "=== Variables Injected ===" &&
              tail -30 antora-playbook.yml
            else
              echo "=== No ConfigMap found, skipping variable injection ==="
            fi &&
            {% else %}
            echo "=== No variables to inject ===" &&
            {% endif %}
            npm install &&
            npm run build &&
            cp -r build/site/* /app/ &&
            echo "=== Build Complete ===" &&
            ls -la /app/
          volumeMounts: "{{ _init_volume_mounts }}"
        containers:
        - name: nginx
          image: "{{ quickcourse_ocp_webserver_image }}"
          ports:
          - containerPort: 80
          volumeMounts:
          - name: app
            mountPath: /usr/share/nginx/html
        volumes: "{{ _pod_volumes }}"

- name: Create Service for Quick Course
  kubernetes.core.k8s:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    state: present
    namespace: "{{ quickcourse_ocp_namespace }}"
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: quickcourse
        labels:
          app: quickcourse
      spec:
        selector:
          app: quickcourse
        ports:
        - protocol: TCP
          port: 80
          targetPort: 80

- name: Create Route for Quick Course
  kubernetes.core.k8s:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    state: present
    namespace: "{{ quickcourse_ocp_namespace }}"
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: quickcourse
      spec:
        to:
          kind: Service
          name: quickcourse
        port:
          targetPort: 80
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect

- name: Wait for pod to be running
  kubernetes.core.k8s_info:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    kind: Pod
    name: quickcourse
    namespace: "{{ quickcourse_ocp_namespace }}"
  register: quickcourse_pod_info
  until:
  - quickcourse_pod_info.resources | length > 0
  - quickcourse_pod_info.resources[0].status.phase == "Running"
  retries: 60
  delay: 10

- name: Get Route URL
  kubernetes.core.k8s_info:
    host: "{{ quickcourse_openshift_api_url }}"
    api_key: "{{ quickcourse_openshift_api_key }}"
    validate_certs: false
    ca_cert: "{{ quickcourse_openshift_api_ca_cert }}"
    kind: Route
    name: quickcourse
    namespace: "{{ quickcourse_ocp_namespace }}"
  register: quickcourse_route_info

- name: Set Quick Course URL fact
  set_fact:
    quickcourse_primary_view_url: "https://{{ quickcourse_route_info.resources[0].spec.host }}/"

- name: Display Quick Course deployment summary
  debug:
    msg: |
      ========================================
      Quick Course Deployment Complete!
      ========================================

      Quick Course URL: {{ quickcourse_primary_view_url }}
      Namespace: {{ quickcourse_ocp_namespace }}

      Variables injected: {{ quickcourse_collected_vars.keys() | list | length }} variables
      ========================================
