---
# Validate required parameters
- name: Validate required parameters
  when: quickcourse_deploy | default(true) | bool
  block:
    - name: Ensure quickcourse_git_repo is provided
      assert:
        that:
          - quickcourse_git_repo is defined
          - quickcourse_git_repo | length > 0
        fail_msg: |
          ERROR: quickcourse_git_repo is required but not provided!

          Please provide the Quick Course repository URL via:
            - Extra vars: -e "quickcourse_git_repo=https://github.com/..."
            - Playbook vars
            - Role vars

          Example:
            ansible-playbook playbook.yml -e "quickcourse_git_repo=https://github.com/RedHatQuickCourses/aap-on-openshift.git"
        success_msg: "Repository URL: {{ quickcourse_git_repo }}"

# Collect variables for injection into Quick Course content
- name: Collect variables for Quick Course deployment
  when: quickcourse_deploy | default(true) | bool
  block:
    - name: Auto-collect variables from extra-vars using varnames lookup
      set_fact:
        quickcourse_collected_vars: {}
      when: quickcourse_auto_collect_vars | default(false) | bool

    - name: Collect each variable safely
      set_fact:
        quickcourse_collected_vars: "{{ quickcourse_collected_vars | default({}) | combine({item: lookup('vars', item)}) }}"
      loop: "{{ q('varnames', '^(?!ansible_|quickcourse_|hostvars|groups|group_names|inventory_|playbook_|omit|item|role_|play_hosts|play_batch|vars|environment|__)[a-z].*') }}"
      when:
        - quickcourse_auto_collect_vars | default(false) | bool
        - item not in quickcourse_auto_collect_exclude | default([])
        - lookup('vars', item, default='__UNDEFINED__') != '__UNDEFINED__'
        - lookup('vars', item) is not mapping or (lookup('vars', item) is mapping and lookup('vars', item).keys() | list | length < 100)
      failed_when: false

    - name: Use custom attributes for variable injection (takes precedence)
      set_fact:
        quickcourse_collected_vars: "{{ quickcourse_collected_vars | default({}) | combine(quickcourse_custom_attributes) }}"
      when: quickcourse_custom_attributes is defined and quickcourse_custom_attributes | length > 0

# OpenShift Deployment
- name: Deploy Quick Course to OpenShift
  when:
    - quickcourse_deploy | default(true) | bool
    - quickcourse_deployment_ocp | default('no') in ['yes', 'true', true, 'Yes', 'YES']
  block:
    - name: Deploy to OpenShift cluster
      ansible.builtin.include_tasks:
        file: 70-quickcourse-deploy-openshift.yml
      tags:
        - quickcourse-openshift

# Local Deployment (Bare Metal)
- name: Deploy Quick Course locally (bare metal)
  when:
    - quickcourse_deploy | default(true) | bool
    - quickcourse_deployment_ocp | default('no') not in ['yes', 'true', true, 'Yes', 'YES']
  block:

    - name: Setup OS dependencies and packages
      ansible.builtin.include_tasks:
        file: 10-quickcourse-dependencies.yml
      tags:
        - quickcourse-dependency-setup

    - name: Setup the quick course user and working directories
      ansible.builtin.include_tasks:
        file: 20-quickcourse-user-setup.yml
      tags:
        - quickcourse-user-setup

    - name: Setup ssh config for lab accounts (if terminals enabled)
      when: quickcourse_enable_terminals | default(false) | bool
      ansible.builtin.include_tasks:
        file: 22-quickcourse-users-security.yml
      tags:
        - quickcourse-user-security

    - name: Clone quick course repo and build with npm
      ansible.builtin.include_tasks:
        file: 30-quickcourse-clone-and-build.yml
      tags:
        - quickcourse-clone-and-build

    - name: Setup optional terminal services
      when:
        - quickcourse_enable_terminals | default(false) | bool
        - quickcourse_tab_services | length > 0
      ansible.builtin.include_tasks:
        file: 32-quickcourse-optional-terminals.yml
      tags:
        - quickcourse-terminals

    - name: Post-build customizations and rendering
      ansible.builtin.include_tasks:
        file: 40-quickcourse-render.yml
      tags:
        - quickcourse-render

    - name: Create, enable, start quick course systemd service
      ansible.builtin.include_tasks:
        file: 50-quickcourse-service.yml
      tags:
        - quickcourse-services

    - name: Validate quick course service and output URLs
      ansible.builtin.include_tasks:
        file: 60-quickcourse-verify.yml
      tags:
        - quickcourse-verify
