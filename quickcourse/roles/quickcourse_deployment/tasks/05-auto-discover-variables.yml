---
# Auto-discover OpenShift credentials before validation runs.
# Priority:
#   1. Any extra-var whose name contains 'openshift_api_key' or 'openshift_bearer_token'
#      (e.g. sandbox_openshift_api_key) - internal quickcourse_ vars are excluded
#      → validates by attempting oc login --token; if login fails, falls through to step 2
#   2. openshift_username + openshift_password → oc login → fresh token
#      Falls back to common_password if openshift_password not set
#   3. oc whoami --show-token (if oc is present and already logged in)
# All tasks are non-blocking.

- name: Auto-discover OpenShift credentials
  when:
    - quickcourse_deployment_ocp | default('no') in ['yes', 'true', true, 'Yes', 'YES']
  block:
    # ----------------------------------------------------------------
    # Step 1: scan playbook variable scope for any *openshift_api_key*
    #         or *openshift_bearer_token* variable (exclude internal ones)
    # ----------------------------------------------------------------
    - name: Find extra-vars matching openshift key pattern
      ansible.builtin.set_fact:
        _discovered_key_vars: >-
          {{ q('varnames', 'openshift_api_key|openshift_bearer_token')
             | reject('match', '^quickcourse_') | list }}
      failed_when: false
      ignore_errors: true

    - name: Find extra-vars matching openshift URL pattern
      ansible.builtin.set_fact:
        _discovered_url_vars: >-
          {{ q('varnames', 'openshift_api_url|openshift_api_server')
             | reject('match', '^quickcourse_') | list }}
      failed_when: false
      ignore_errors: true

    - name: Set quickcourse_openshift_api_key from first matching extra-var
      ansible.builtin.set_fact:
        quickcourse_openshift_api_key: "{{ lookup('vars', _discovered_key_vars[0]) }}"
      when:
        - _discovered_key_vars | default([]) | length > 0
        - quickcourse_openshift_api_key | default('') | length == 0
      failed_when: false
      ignore_errors: true

    - name: Set quickcourse_openshift_api_url from first matching extra-var
      ansible.builtin.set_fact:
        quickcourse_openshift_api_url: "{{ lookup('vars', _discovered_url_vars[0]) }}"
      when:
        - _discovered_url_vars | default([]) | length > 0
        - quickcourse_openshift_api_url | default('') | length == 0
      failed_when: false
      ignore_errors: true

    # ----------------------------------------------------------------
    # Step 1b: validate discovered token via a real API call
    #          if the token is rejected, clear it so step 2 can run
    # ----------------------------------------------------------------
    - name: Validate discovered token via API call
      when:
        - quickcourse_openshift_api_key | default('') | length > 0
        - quickcourse_openshift_api_url | default('') | length > 0
      block:
        - name: Test token against cluster API
          kubernetes.core.k8s_info:
            host: "{{ quickcourse_openshift_api_url }}"
            api_key: "{{ quickcourse_openshift_api_key }}"
            validate_certs: false
            kind: Namespace
            name: default
          register: _token_validation
          failed_when: false
          ignore_errors: true
          no_log: true

        - name: Clear invalid token so password fallback can run
          ansible.builtin.set_fact:
            quickcourse_openshift_api_key: ""
          when: _token_validation.failed | default(false)

    # ----------------------------------------------------------------
    # Step 2: username + password → oc login → fresh token
    #         runs when: key is empty OR discovered token failed validation
    #         Falls back to common_password if openshift_password not set
    # ----------------------------------------------------------------
    - name: Authenticate with username and password via oc login
      when:
        - quickcourse_openshift_api_key | default('') | length == 0
        - openshift_username | default('') | length > 0
        - openshift_password | default('') | length > 0
        - quickcourse_openshift_api_url | default('') | length > 0
      block:
        - name: Login to OpenShift with username and password
          ansible.builtin.command: >
            oc login {{ quickcourse_openshift_api_url }}
            --username={{ openshift_username }}
            --password={{ openshift_password }}
            --insecure-skip-tls-verify=true
          register: _oc_login_result
          changed_when: false
          failed_when: false
          ignore_errors: true
          no_log: true

        - name: Get token after oc login
          ansible.builtin.command: oc whoami --show-token
          register: _oc_token_after_login
          changed_when: false
          failed_when: false
          ignore_errors: true
          when: _oc_login_result.rc | default(1) == 0

        - name: Set token from oc login
          ansible.builtin.set_fact:
            quickcourse_openshift_api_key: "{{ _oc_token_after_login.stdout | trim }}"
          when:
            - _oc_login_result.rc | default(1) == 0
            - _oc_token_after_login.stdout | default('') | trim | length > 0

    # ----------------------------------------------------------------
    # Step 3: fall back to oc CLI if credentials are still missing
    # ----------------------------------------------------------------
    - name: Generate token from oc session (fallback)
      when: quickcourse_openshift_api_key | default('') | length == 0
      block:
        - name: Get OpenShift API URL from oc
          ansible.builtin.command: oc whoami --show-server
          register: _oc_server
          changed_when: false
          failed_when: false
          ignore_errors: true

        - name: Get OpenShift token from oc
          ansible.builtin.command: oc whoami --show-token
          register: _oc_token
          changed_when: false
          failed_when: false
          ignore_errors: true

        - name: Set credentials from oc session
          ansible.builtin.set_fact:
            quickcourse_openshift_api_url: "{{ _oc_server.stdout | trim }}"
            quickcourse_openshift_api_key: "{{ _oc_token.stdout | trim }}"
          when:
            - _oc_server.rc | default(1) == 0
            - _oc_token.rc | default(1) == 0
            - _oc_server.stdout | default('') | trim | length > 0
            - _oc_token.stdout | default('') | trim | length > 0

    - name: Debug resolved credentials
      ansible.builtin.debug:
        msg: >-
          OpenShift credentials resolved —
          source={{ _discovered_key_vars[0] | default('oc-session') }},
          api={{ quickcourse_openshift_api_url | default('(not set)') }}
        verbosity: 1
      when: quickcourse_openshift_api_key | default('') | length > 0
